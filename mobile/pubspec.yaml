name: mobile
description: "SCFMS — Construction Field Management System mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0

  # Immutable models / codegen
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Storage / DI / routing
  flutter_secure_storage: ^9.2.2
  get_it: ^8.0.2
  go_router: ^14.6.2

  # Maps (OpenStreetMap — Google Maps is prohibited by the PRD)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location tracking
  geolocator: ^13.0.2
  flutter_foreground_task: ^8.17.0
  permission_handler: ^11.3.1

  # Photos
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Utils
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.5.1

  # Offline queue (local persistence for retry-on-reconnect)
  sqflite: ^2.4.3
  path: ^1.9.1
  connectivity_plus: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # sqflite backend for `flutter test` (no real platform channel there)
  sqflite_common_ffi: ^2.4.2

flutter:
  uses-material-design: true
