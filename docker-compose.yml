name: scms

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scfms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scfms_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-scfms}
    ports:
      - "${SCMS_DB_PORT:-15432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scfms} -d ${POSTGRES_DB:-scfms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${SCMS_REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-scfms_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-scfms_minio_password}
    ports:
      - "${SCMS_MINIO_PORT:-19000}:9000"
      - "${SCMS_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${SCMS_BACKEND_PORT:-18000}:8000"
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
